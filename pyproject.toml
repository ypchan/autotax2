[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "autotax2"
version = "0.1.0"
description = "A VSEARCH-based, local-reference workflow inspired by AutoTax for full-length rRNA de novo taxonomy workflows."
readme = "README.md"
requires-python = ">=3.9"
dependencies = ["rich>=13", "rich-argparse>=1.4"]
license = {text = "MIT"}
authors = [
  {name = "AutoTax2 contributors"}
]
keywords = ["vsearch", "silva", "taxonomy", "16S", "18S", "rRNA", "SINTAX", "OTU", "ASV"]
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: MIT License",
  "Topic :: Scientific/Engineering :: Bio-Informatics"
]

[project.scripts]
autotax2 = "autotax2.cli:main"

[tool.setuptools]
packages = ["autotax2"]
