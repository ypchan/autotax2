project:
  name: example-autotax2-reference
  workdir: ./autotax2-work

silva:
  fasta: ./inputs/silva.fasta
  taxonomy: ./inputs/silva.tax

defaults:
  vsearch_iddef: 2
  sina_orientation: loose
  dataset_input_contract: externally_processed_ssu
  near_best_delta: 0.01
  taxonomy_thresholds:
    species: 0.972
    genus: 0.901
    family: 0.801
    order: 0.729
    class: 0.722
    phylum: 0.696

exports:
  output_dir: ./exports
  formats:
    - sintax
    - qiime2
    - dada2-togenus
    - dada2-species
